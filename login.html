<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Login — Plano de Estudos</title>

<!-- GIS -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
    margin:0;
    background:#eef2f7;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Inter,system-ui;
    color:#0b2540;
}
.card{
    width:350px;
    padding:26px;
    background:white;
    border-radius:12px;
    text-align:center;
    box-shadow:0 6px 20px rgba(0,0,0,0.10);
}
h1{
    font-size:22px;
    font-weight:700;
    margin-bottom:10px;
}
p{
    font-size:14px;
    color:#444;
}
#buttonDiv{
    margin-top:20px;
}
</style>
</head>

<body>

<div class="card">
    <h1>Plano de Estudos</h1>
    <p>Entre com sua conta Google para sincronizar seu progresso.</p>

    <div id="buttonDiv"></div>

    <p style="font-size:11px;margin-top:16px;color:#777">
        Permita popups e cookies se o login não abrir.
    </p>
</div>


<script type="module">
import { saveTokenAfterLogin } from "./js/auth.js";

window.onload = () => {

    google.accounts.id.initialize({
        client_id: "553818652026-vjsmkokm1pibph3ehai36q3pmbp8js88.apps.googleusercontent.com",
        callback: handleCredential
    });

    google.accounts.id.renderButton(
        document.getElementById("buttonDiv"),
        {
            theme: "filled_blue",
            size: "large",
            shape: "pill",
            width: 260
        }
    );
};

async function handleCredential(response) {
    try {
        await saveTokenAfterLogin(response.credential);

        window.location.href = "./index.html";

    } catch (e) {
        console.error("Erro ao salvar token", e);
        alert("Erro ao autenticar. Veja o console.");
    }
}
</script>


</body>
</html>
