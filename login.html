<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login — Plano de Estudos</title>

<style>
body {
  margin: 0;
  background: #eef2f7;
  font-family: Inter, Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: white;
  padding: 26px;
  border-radius: 12px;
  width: 360px;
  text-align: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}
.btn {
  background: #0b5ea8;
  color: white;
  border: 0;
  padding: 10px 18px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
}
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="global-auth.js"></script>

<div id="g_id_onload"
     data-client_id="553818652026-vjsmkokm1pibph3ehai36q3pmbp8js88.apps.googleusercontent.com"
     data-context="signin"
     data-ux_mode="popup"
     data-callback="handleCredentialResponse">
</div>

<div class="g_id_signin"
     data-type="standard"
     data-shape="rectangular"
     data-theme="filled_blue"
     data-text="signin_with"
     data-size="large">
</div>


</body>
</html>
