<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Login — Plano de Estudos</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{
    margin:0;
    font-family:Inter,system-ui;
    background:#eef2f7;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    color:#0b2540;
}
.card{
    background:white;
    width:360px;
    padding:28px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    text-align:center;
}
h1{
    font-size:22px;
    margin-bottom:10px;
}
p{
    font-size:14px;
    color:#444;
}
#buttonDiv{
    margin-top:20px;
}
</style>
</head>
<body>

<div class="card">
    <h1>Plano de Estudos</h1>
    <p>Entre com sua conta Google para sincronizar seu progresso com o Drive (AppData).</p>

    <div id="buttonDiv"></div>

    <p style="font-size:11px;margin-top:16px;color:#777">
        Se o popup não abrir, permita popups e cookies de terceiros.
    </p>
</div>

<script type="module">
import { loginWithGoogle } from "./auth.js";

window.onload = () => {

    google.accounts.id.renderButton(
        document.getElementById("buttonDiv"),
        {
            theme: "filled_blue",
            size: "large",
            shape: "pill",
            text: "signin_with"
        }
    );

    document.getElementById("buttonDiv").onclick = async () => {
        try {
            await loginWithGoogle();
            window.location.href = "./index.html";
        } catch (e) {
            console.error(e);
            alert("Erro ao autenticar. Veja o console.");
        }
    };
};
</script>

</body>
</html>
