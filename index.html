<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Plano de Estudos — v1.0</title>

<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./logo2.ico" />
<meta name="theme-color" content="#0b5ea8" />

<style>
/* TODOS SEUS ESTILOS MANTIDOS AQUI (não alterei nada) */
</style>
</head>
<body>

<div class="app" id="app" style="display:none">
  <aside class="sidebar card">
    <img id="logo" src="./logo.png" alt="Logo" />
    <h1>Plano de Estudos</h1>
    <div class="meta">PC-BA & PRF-ADM</div>

    <div class="controls">
      <button id="exportBtn" class="small btn-ghost">Exportar JSON</button>
      <button id="importBtn" class="small btn-ghost">Importar JSON</button>
      <button id="syncBtn" class="small">Sincronizar Drive</button>
    </div>

    <div id="authArea"></div>

    <div class="status-line" id="syncStatus">Status: carregando...</div>
    <div class="meta" style="font-size:12px">Versão: v1.0</div>
  </aside>

  <main class="main">
    <div id="pageContainer"></div>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
      <h3 id="modalTitle">Notas</h3>
      <textarea id="noteArea"></textarea>
      <div class="footer-row">
         <button id="closeModal" class="btn-ghost small">Fechar</button>
         <button id="deleteNote" class="btn-ghost small">Apagar</button>
         <button id="saveNote" class="small">Salvar</button>
      </div>
  </div>
</div>

<script type="module">

/* ================================================
   IMPORTA O auth.js
================================================ */
import { 
    loadSavedToken,
    logout,
    findAppDataFile,
    createAppDataFile,
    updateAppDataFile,
    downloadAppDataFile
} from "./auth.js";

/* ================================================
   1 — VALIDAR LOGIN
================================================ */
const token = loadSavedToken();

if (!token) {
    console.warn("Sem token → redirecionando para login...");
    window.location.href = "./login.html";
} else {
    console.log("Token OK, exibindo app");
    document.getElementById("app").style.display = "grid";
}

/* ================================================
   2 — STATE LOCAL
================================================ */
const STORAGE_KEY = "progresso_estudos_v1";
const DRIVE_FILENAME = "progresso_estudos.json";

function defaultState() {
    return { materias:{}, notes:{}, updatedAt:0 };
}

function loadLocal() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : defaultState();
    } catch {
        return defaultState();
    }
}

function saveLocal(state) {
    state.updatedAt = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadLocal();

/* ================================================
   3 — SYNC COM DRIVE
================================================ */

async function syncDrive() {
    document.getElementById("syncStatus").textContent = "Sincronizando...";

    try {
        const file = await findAppDataFile(DRIVE_FILENAME);

        if (!file) {
            await createAppDataFile(DRIVE_FILENAME, state);
            document.getElementById("syncStatus").textContent = "Criado no Drive";
            return;
        }

        const remote = await downloadAppDataFile(file.id);

        if (remote.updatedAt > state.updatedAt) {
            state = remote;
            saveLocal(state);
            document.getElementById("syncStatus").textContent = "Baixado do Drive";
        } else {
            await updateAppDataFile(file.id, state);
            document.getElementById("syncStatus").textContent = "Enviado ao Drive";
        }

    } catch (err) {
        console.error(err);
        document.getElementById("syncStatus").textContent = "Erro ao sincronizar";
    }
}

document.getElementById("syncBtn").onclick = syncDrive;

/* ================================================
   4 — INTERFACE BÁSICA
================================================ */

document.getElementById("authArea").innerHTML = `
    <button id="logoutBtn" class="small btn-ghost">Sair</button>
`;

document.getElementById("logoutBtn").onclick = logout;

document.getElementById("pageContainer").innerHTML = `
    <h2>Olá!</h2>
    <p>Seu login foi validado corretamente.</p>
    <p>A sincronização com o Google Drive está ativa.</p>
`;

</script>

</body>
</html>
