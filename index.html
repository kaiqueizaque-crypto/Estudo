<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Plano de Estudos — v2.0</title>

<link rel="stylesheet" href="./css/style.css">
<script type="module" src="./js/app.js"></script>
</head>

<body>

<!-- App Wrapper -->
<div class="app" id="app" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar card">
        <img id="logo" src="./logo.png" alt="Logo" />
        <h1>Plano de Estudos</h1>
        <div class="meta">PC-BA & PRF-ADM</div>

        <div class="contest-list" id="contestList"></div>

        <div class="controls">
            <button id="exportBtn" class="small btn-ghost">Exportar JSON</button>
            <button id="importBtn" class="small btn-ghost">Importar JSON</button>
            <button id="syncBtn" class="small">Sincronizar Drive</button>
        </div>

        <div id="authArea"></div>

        <div class="status-line" id="syncStatus">Status: carregando...</div>

        <button id="clearCaches" class="small btn-ghost clear-cache">Limpar cache PWA</button>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <div id="mainContent"></div>
    </main>

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
        <h3 id="modalTitle">Notas</h3>
        <textarea id="noteArea"></textarea>
        <div class="footer-row">
            <button id="closeModal" class="btn-ghost small">Fechar</button>
            <button id="deleteNote" class="btn-ghost small">Apagar</button>
            <button id="saveNote" class="small">Salvar</button>
        </div>
    </div>
</div>

<!-- MODULES -->
<script type="module">
import { loadSavedToken, logout } from "./auth.js";
import * as State from "./js/state.js";
import * as UI from "./js/ui.js";
import * as Sync from "./js/sync.js";
import { setupAppEvents } from "./js/app.js";

/* ============================
   LOGIN CHECK
============================ */
const token = loadSavedToken();
if (!token) {
    window.location.href = "./login.html";
}

/* ============================
   APP BOOT
============================ */
window.onload = () => {
    document.getElementById("app").style.display = "grid";

    UI.initLayout();
    State.initState();
    setupAppEvents();
    
    // Executa 1 sync ao iniciar
    Sync.initialSync();
};
</script>

</body>
</html>
