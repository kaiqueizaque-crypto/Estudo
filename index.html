<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plano de Estudos</title>

  <link rel="stylesheet" href="./css/style.css">
  <link rel="manifest" href="./manifest.json">

  <!-- Icone -->
  <link rel="icon" href="./logo.png" type="image/png">

  <!-- Google Identity (necessário para logout seguro) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

  <div id="app">
    <header class="app-header">
      <img src="./logo2.png" class="app-logo" alt="Logo">
      <h1>Plano de Estudos</h1>
      <p id="syncStatus">Status: aguardando</p>

      <button id="btnLogout" class="btn-danger">Sair da conta</button>
    </header>

    <main class="app-main">
      <!-- Área de matérias (renderizada pelo ui.js) -->
      <div id="materiasContainer"></div>
    </main>

    <footer class="app-footer">
      <button id="btnExport" class="btn">Exportar JSON</button>
      <button id="btnImport" class="btn">Importar JSON</button>
      <button id="btnSync"   class="btn-primary">Sincronizar Drive</button>
      <button id="btnPwa"    class="btn">Limpar cache PWA</button>
    </footer>
  </div>

  <!-- Scripts principais (corrigidos para usar pasta js/) -->
  <script type="module">
    import "./js/auth.js";
    import "./js/state.js";
    import "./js/ui.js";
    import "./js/sync.js";
    import "./js/app.js";
  </script>

</body>
</html>
