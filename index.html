<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Plano de Estudos — v1.0</title>

<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./logo2.ico" />
<meta name="theme-color" content="#0b5ea8" />

<style>
/* ESTILOS ORIGINAIS — mantidos sem alteração */
:root{--primary:#0b5ea8;--accent:#ff8a00;--bg:#f5f7fb;--card:#fff;--muted:#6b7280;--radius:12px;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;}
*{box-sizing:border-box} 
body{margin:0;background:linear-gradient(180deg,var(--bg),#eef2f7);color:#111827}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh;gap:20px;padding:20px}
.sidebar{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:0 6px 18px rgba(15,23,42,0.06);display:flex;flex-direction:column}
#logo{width:100%;height:56px;object-fit:contain;background:#fff;padding:6px;border-radius:8px}
h1{font-size:18px;margin:8px 0 0;color:var(--primary)}
.meta{font-size:13px;color:var(--muted)}
.contest-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.contest-item{padding:10px 12px;border-radius:8px;cursor:pointer}
.contest-item.active{background:linear-gradient(90deg,var(--primary),#0a4f8d);color:white}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
button{cursor:pointer;border:0;padding:8px 12px;border-radius:8px;background:var(--primary);color:white}
.btn-ghost{background:transparent;color:var(--primary);border:1px solid rgba(11,94,168,0.08)}
.small{padding:6px 8px;font-size:13px}
.main{display:flex;flex-direction:column;gap:14px}
.header{display:flex;align-items:center;justify-content:space-between;gap:12px}
.title{font-size:20px}
.card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 6px 18px rgba(15,23,42,0.04)}
.contest-card{display:grid;grid-template-columns:1fr 220px;gap:14px;align-items:start}
.subject-list{display:flex;flex-direction:column;gap:8px;max-height:560px;overflow:auto;padding-right:6px}
.materia{border-radius:10px;border:1px solid rgba(15,23,42,0.06);padding:8px;background:linear-gradient(180deg,#fff,#f8fbff)}
.materia-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px}
.materia-title{font-weight:700}
.materia-meta{font-size:13px;color:var(--muted)}
.assuntos{margin-top:8px;display:none;flex-direction:column;gap:6px;padding-left:12px}
.assunto{display:flex;align-items:center;gap:10px;padding:6px;border-radius:8px}
.state-btn{width:36px;height:36px;border-radius:8px;border:1px solid rgba(15,23,42,0.06);display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
.note-btn{background:transparent;border:0;color:var(--muted);cursor:pointer}
.rings{display:flex;flex-direction:column;gap:12px;align-items:center}
.ring-outer{width:180px;height:180px}
.ring-label{text-align:center;font-size:13px;color:var(--muted)}
.status-line{margin-top:8px;font-size:13px;color:var(--muted);display:flex;gap:8px;align-items:center}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;padding:24px;z-index:999}
.modal{background:white;border-radius:12px;padding:16px;max-width:900px;width:100%;max-height:86vh;overflow:auto}
.modal textarea{width:100%;height:260px;padding:12px;border-radius:8px;border:1px solid rgba(15,23,42,0.1);resize:vertical}
.footer-row{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.clear-cache{margin-top:8px}
</style>
</head>
<body>

<div class="app" id="app" style="display:none">
  <aside class="sidebar card">
    <img id="logo" src="./logo.png" alt="Logo" />
    <h1>Plano de Estudos</h1>
    <div class="meta">PC-BA & PRF-ADM</div>

    <div class="contest-list" id="contestList"></div>

    <div class="controls">
      <button id="exportBtn" class="small btn-ghost">Exportar JSON</button>
      <button id="importBtn" class="small btn-ghost">Importar JSON</button>
      <button id="syncBtn" class="small">Sincronizar Drive</button>
    </div>

    <div id="authArea"></div>

    <div class="status-line" id="syncStatus">Status: carregando...</div>
    <div class="meta" style="font-size:12px">Versão: v1.0</div>
  </aside>

  <main class="main">
    <div id="pageContainer"></div>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
      <h3 id="modalTitle">Notas</h3>
      <textarea id="noteArea"></textarea>
      <div class="footer-row">
         <button id="closeModal" class="btn-ghost small">Fechar</button>
         <button id="deleteNote" class="btn-ghost small">Apagar</button>
         <button id="saveNote" class="small">Salvar</button>
      </div>
  </div>
</div>

<script type="module">
const token = localStorage.getItem("g_token");

if (!token) {
    // Usuário não autenticado → voltar pro login
    window.location.href = "./login.html";
}

  async function driveRequest(path, method = "GET", body = null) {
    const token = localStorage.getItem("g_token");

    const res = await fetch("https://www.googleapis.com/drive/v3" + path, {
        method,
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: body ? JSON.stringify(body) : null
    });

    return res.json();
}

/* IMPORTA O MÓDULO DE AUTENTICAÇÃO */
import { 
    loadSavedToken,
    logout,
    findAppDataFile,
    createAppDataFile,
    updateAppDataFile,
    downloadAppDataFile
} from "./auth.js";

/* ================================================
   1. VERIFICA LOGIN
================================================ */
const token = loadSavedToken();

if (!token) {
    console.warn("Sem token → redirecionando para login...");
    window.location.href = "login.html";
} else {
    console.log("Token carregado OK");
    document.getElementById("app").style.display = "grid";
}

/* ================================================
   2. CARREGA O APP (STATE LOCAL + DRIVE)
================================================ */

const STORAGE_KEY = "progresso_estudos_v1";
const DRIVE_FILENAME = "progresso_estudos.json";

function loadLocal() {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { materias: {}, notes: {}, updatedAt: 0 };
}

function saveLocal(state) {
    state.updatedAt = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadLocal();

/* ================================================
   3. SINCRONIZAÇÃO COM DRIVE
================================================ */

async function syncDrive() {
    try {
        document.getElementById("syncStatus").textContent = "Sincronizando...";

        const file = await findAppDataFile(DRIVE_FILENAME);

        if (!file) {
            await createAppDataFile(DRIVE_FILENAME, state);
            document.getElementById("syncStatus").textContent = "Sincronizado (criado)";
            return;
        }

        const remote = await downloadAppDataFile(file.id);

        if (remote.updatedAt > state.updatedAt) {
            state = remote;
            saveLocal(state);
            document.getElementById("syncStatus").textContent = "Sincronizado (baixado)";
        } else {
            await updateAppDataFile(file.id, state);
            document.getElementById("syncStatus").textContent = "Sincronizado (enviado)";
        }
    } catch (e) {
        console.error("Erro sync:", e);
        document.getElementById("syncStatus").textContent = "Erro ao sincronizar";
    }
}

document.getElementById("syncBtn").onclick = syncDrive;

/* ================================================
   4. Interface mínima (A SER COMPLETADA)
================================================ */

document.getElementById("authArea").innerHTML = `
    <button class="small btn-ghost" id="logoutBtn">Sair</button>
`;

document.getElementById("logoutBtn").onclick = () => {
    logout();
};

document.getElementById("pageContainer").innerHTML = `
    <h2>Bem-vindo!</h2>
    <p>O layout completo pode ser inserido aqui depois.</p>
    <p>Seu login Drive está ativo.</p>
`;

</script>

</body>
</html>
