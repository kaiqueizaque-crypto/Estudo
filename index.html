<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Plano de Estudos — v2.0</title>

<!-- CSS CORRETO -->
<link rel="stylesheet" href="./css/style.css" />

<!-- Ícone CORRETO -->
<link rel="icon" type="image/png" href="./logo2.png" />

<meta name="theme-color" content="#0b5ea8" />
</head>

<body>

<div class="app" id="app" style="display:none">

  <aside class="sidebar card">
      <img id="logo" src="./logo.png" alt="Logo" />

      <h1>Plano de Estudos</h1>
      <div class="meta">PC-BA & PRF-ADM</div>

      <div id="contestList"></div>

      <button id="exportBtn">Exportar JSON</button>
      <button id="importBtn">Importar JSON</button>
      <button id="syncBtn">Sincronizar Drive</button>

      <div id="authArea"></div>

      <div class="status-line" id="syncStatus">Status: carregando...</div>

      <button id="clearCaches" class="small btn-ghost">Limpar cache PWA</button>
  </aside>

  <main class="main">
    <div id="pageContainer"></div>
  </main>

</div>

<!-- IMPORTS MODULARES CORRETOS -->
<script type="module" src="./js/state.js"></script>
<script type="module" src="./js/util.js"></script>
<script type="module" src="./js/ui.js"></script>
<script type="module" src="./js/sync.js"></script>
<script type="module" src="./js/auth.js"></script>
<script type="module" src="./js/app.js"></script>

</body>
</html>
