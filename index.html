<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plano de Estudos — v2.0</title>

  <!-- CSS (pasta css/ conforme combinado) -->
  <link rel="stylesheet" href="./css/style.css" />

  <!-- ícones -->
  <link rel="icon" type="image/png" href="./logo2.png" />
  <meta name="theme-color" content="#0b5ea8" />
</head>

<body>

  <!-- APP WRAPPER (iniciado hidden até o boot do JS) -->
  <div id="app" class="app" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar card">
      <img id="logo" src="./logo.png" alt="Logo" />

      <h1>Plano de Estudos</h1>
      <div class="meta">PC-BA & PRF-ADM</div>

      <div id="contestList" class="contest-list"></div>

      <div class="controls" style="margin-top:12px">
        <button id="exportBtn" class="small btn-ghost">Exportar JSON</button>
        <button id="importBtn" class="small btn-ghost">Importar JSON</button>
        <button id="syncBtn" class="small">Sincronizar Drive</button>
      </div>

      <div id="authArea" style="margin-top:12px"></div>

      <div id="syncStatus" class="status-line" style="margin-top:12px">Status: carregando...</div>

      <button id="clearCaches" class="small btn-ghost clear-cache" style="margin-top:12px">Limpar cache PWA</button>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div id="pageContainer"></div>
    </main>
  </div>

  <!-- MODAL NOTAS -->
  <div id="modalBackdrop" class="modal-backdrop" style="display:none">
    <div class="modal">
      <h3 id="modalTitle">Notas</h3>
      <textarea id="noteArea" placeholder="Anotações por matéria..."></textarea>
      <div class="footer-row">
        <button id="closeModal" class="btn-ghost small">Fechar</button>
        <button id="deleteNote" class="btn-ghost small">Apagar</button>
        <button id="saveNote" class="small">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Single entrypoint: app.js -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
