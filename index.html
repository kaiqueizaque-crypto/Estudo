<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Plano de Estudos — v1.0</title>

<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./logo2.ico" />
<meta name="theme-color" content="#0b5ea8" />

<style>
/* MANTIVE SEU LAYOUT ORIGINAL */
:root{--primary:#0b5ea8;--accent:#ff8a00;--bg:#f5f7fb;--card:#fff;--muted:#6b7280;--radius:12px;font-family:Inter,system-ui;}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,var(--bg),#eef2f7);color:#111827;}

.app{
    display:grid;
    grid-template-columns:280px 1fr;
    min-height:100vh;
    gap:20px;
    padding:20px;
}

.sidebar{
    background:var(--card);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:0 6px 18px rgba(15,23,42,0.06);
    display:flex;
    flex-direction:column;
}

#logo{width:100%;height:56px;object-fit:contain;background:#fff;padding:6px;border-radius:8px}
h1{font-size:18px;margin:8px 0 0;color:var(--primary)}
.meta{font-size:13px;color:var(--muted)}
button{cursor:pointer;border:0;border-radius:8px;background:var(--primary);color:white;padding:8px 12px}
.btn-ghost{background:transparent;border:1px solid rgba(11,94,168,0.2);color:var(--primary)}
.small{padding:6px 8px;font-size:13px}
</style>
</head>
<body>

<div id="loading" style="padding:40px;text-align:center;font-family:Inter;">
    <h2>Carregando...</h2>
</div>

<div class="app" id="app" style="display:none">
    <aside class="sidebar">
        <img id="logo" src="./logo.png" />

        <h1>Plano de Estudos</h1>
        <div class="meta">PC-BA & PRF-ADM</div>

        <div style="height:12px"></div>

        <button id="syncBtn" class="small">Sincronizar Drive</button>

        <div id="authArea" style="margin-top:12px"></div>

        <div style="height:10px"></div>
        <div class="meta" id="syncStatus">Status: carregando...</div>
    </aside>

    <main id="mainArea" style="padding:20px;">
        <h2>Bem-vindo!</h2>
        <p>Seu login Drive está ativo.</p>
        <p>Agora podemos reinserir aqui todo seu layout completo.</p>
    </main>
</div>

<script type="module">
import {
    loadSavedToken,
    logout,
    findAppDataFile,
    createAppDataFile,
    updateAppDataFile,
    downloadAppDataFile
} from "./auth.js";

/* ===============================
   1. VALIDAR LOGIN
=============================== */
const token = loadSavedToken();

if (!token) {
    window.location.href = "./login.html";
}

/* ===============================
   2. INICIAR TELA
=============================== */
document.getElementById("loading").style.display = "none";
document.getElementById("app").style.display = "grid";

document.getElementById("authArea").innerHTML = `
    <button class="small btn-ghost" id="logoutBtn">Sair</button>
`;
document.getElementById("logoutBtn").onclick = logout;

/* ===============================
   3. SINCRONIZAÇÃO DRIVE
=============================== */

const STORAGE_KEY = "progresso_estudos_v1";
const FILE_NAME = "progresso_estudos.json";

function loadLocal() {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { materias:{}, notes:{}, updatedAt:0 };
}

function saveLocal(state) {
    state.updatedAt = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadLocal();

async function syncDrive() {
    document.getElementById("syncStatus").textContent = "Sincronizando...";

    try {
        const file = await findAppDataFile(FILE_NAME);

        if (!file) {
            await createAppDataFile(FILE_NAME, state);
            document.getElementById("syncStatus").textContent = "Criado no Drive";
            return;
        }

        const remote = await downloadAppDataFile(file.id);

        if (remote.updatedAt > state.updatedAt) {
            state = remote;
            saveLocal(state);
            document.getElementById("syncStatus").textContent = "Sincronizado (baixado)";
        } else {
            await updateAppDataFile(file.id, state);
            document.getElementById("syncStatus").textContent = "Sincronizado (enviado)";
        }
    }
    catch (e) {
        console.error(e);
        document.getElementById("syncStatus").textContent = "Erro ao sincronizar";
    }
}

document.getElementById("syncBtn").onclick = syncDrive;
document.getElementById("syncStatus").textContent = "Pronto";
</script>

</body>
</html>
