<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plano de Estudos</title>

  <link rel="stylesheet" href="./css/style.css">

  <!-- Manifest + PWA -->
  <link rel="manifest" href="./manifest.json" />
</head>

<body>

  <!-- ============================================================
       MODAL DE NOTAS (necessário para o ui.js)
  ============================================================ -->
  <div id="modalBackdrop" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <span id="modalTitle">Notas</span>
        <button id="closeModal" class="modal-close">X</button>
      </div>

      <textarea id="noteArea" class="modal-textarea"></textarea>

      <div class="modal-actions">
        <button id="deleteNote" class="btn danger">Excluir</button>
        <button id="saveNote" class="btn primary">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       CABEÇALHO
  ============================================================ -->
  <header class="header-main">
    <img src="./logo2.png" class="logo">

    <div class="header-info">
      <h1>Plano de Estudos</h1>
      <div id="syncStatus">Status: aguardando</div>
    </div>

    <div class="header-actions">
      <button id="btnLogout" class="btn danger">Sair da conta</button>
    </div>
  </header>


  <!-- ============================================================
       CONTEÚDO PRINCIPAL
  ============================================================ -->
  <main class="main-container">

    <!-- Sidebar com concursos -->
    <aside class="sidebar">
      <div id="contestList"></div>

      <button id="btnSync" class="btn primary" style="margin-top:20px;">
        Sincronizar Drive
      </button>

      <button id="btnClearCache" class="btn secondary" style="margin-top:10px;">
        Limpar cache PWA
      </button>
    </aside>

    <!-- Conteúdo -->
    <section id="pageContainer" class="page-container">
      <!-- Renderizado dinamicamente pelo ui.js -->
    </section>
  </main>


  <!-- ============================================================
       SCRIPTS DO APLICATIVO
  ============================================================ -->

  <script type="module" src="./js/app.js"></script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>

</body>
</html>
